# electron-builder config for the VideoCraft desktop app (P3, packaging-design.md §3).
#
# Prereq: packaging/build_sidecar.ps1 has produced desktop/resources/sidecar/
# (the PyInstaller onedir). Then: pnpm build:win → out/ + installer in release/.
#
# `files` deliberately omits node_modules: electron/ imports only `electron` +
# node: builtins (verified), and the renderer's third-party deps are vite-bundled
# into out/renderer/. Packing node_modules would only invite the pnpm symlink
# quirks electron-builder has with hoisted vs isolated stores.

appId: com.dosmoon.videocraft
productName: VideoCraft
copyright: Copyright © 2026 dosmoon

directories:
  output: release
  buildResources: build

files:
  - out/**
  - package.json

# The frozen Python sidecar ships outside the asar, under <app>/resources/sidecar/
# — exactly where paths.ts looks for it in packaged mode. The bundled ffmpeg /
# ffprobe (packaging/fetch_ffmpeg.ps1) ship directly under <app>/resources/ so
# they land on the sidecar's PATH (paths.ts extraPath = process.resourcesPath):
# yt-dlp merges 1080p DASH streams via ffmpeg, source_acquire probes/cuts.
extraResources:
  - from: resources/sidecar
    to: sidecar
  - from: resources/ffmpeg.exe
    to: ffmpeg.exe
  - from: resources/ffprobe.exe
    to: ffprobe.exe
  # Brand icon for the runtime BrowserWindow/taskbar (paths.ts iconPath →
  # <app>/resources/icon.ico). buildResources/icon.ico is also auto-used by
  # electron-builder for the NSIS installer UI.
  - from: build/icon.ico
    to: icon.ico

asar: true

win:
  # Brand icon from the logo (desktop/build/icon.ico). Used for the NSIS
  # installer + Start-Menu shortcut here; the exe-EMBEDDED icon additionally needs
  # rcedit/winCodeSign (see signAndEditExecutable below) — CI does that.
  icon: build/icon.ico
  target:
    - target: nsis
      arch:
        - x64
  artifactName: ${productName}-${version}-setup.${ext}
  # Skip signing + rcedit exe-resource editing. Editing pulls electron-builder's
  # winCodeSign tool, whose archive contains macOS symlinks that fail to extract
  # on a non-admin / non-Developer-Mode Windows box. Off → no winCodeSign needed
  # (the exe keeps the default Electron icon on a local build).
  #
  # CI (.github/workflows/build-windows.yml) overrides this back to `true` via
  # `-c.win.signAndEditExecutable=true`: a GitHub windows runner has the symlink
  # privilege winCodeSign needs, so rcedit embeds the real brand icon there. The
  # exe is still unsigned until an Authenticode cert is configured (design §3/§10).
  signAndEditExecutable: false

nsis:
  # Per-user install (no admin) into %LOCALAPPDATA%\Programs\VideoCraft — a
  # WRITABLE location, so paths.ts's install-local user_data (beside the exe)
  # works without admin and honours the portable-data rule (not %APPDATA%).
  perMachine: false
  oneClick: false
  allowToChangeInstallationDirectory: true
