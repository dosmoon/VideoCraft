<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>VideoCraft – clip preview</title>
<style>
  html, body { margin: 0; padding: 0; background: #1a1a1a; color: #ddd;
               font-family: -apple-system, "Segoe UI", sans-serif;
               overflow: hidden; height: 100%; }
  .stage { position: relative; width: 100%; height: 100%;
           background: black; display: flex; flex-direction: column; }
  .video-wrap { position: relative; flex: 1; min-height: 0;
                display: flex; align-items: center; justify-content: center; }
  video { max-width: 100%; max-height: 100%; display: block; background: #000; }
  canvas { position: absolute; pointer-events: none;
           cursor: grab; }
  canvas.draggable { pointer-events: auto; }
  .empty { color: #666; font-size: 14px; }
  .err { position: absolute; left: 8px; top: 8px;
         background: rgba(180,30,30,0.85); color: #fff;
         padding: 4px 8px; font: 12px Consolas, monospace; }
</style>
</head>
<body>
<div class="stage" id="stage">
  <div class="video-wrap" id="vwrap">
    <video id="vid" controls playsinline></video>
    <canvas id="canvas"></canvas>
  </div>
  <div class="empty" id="emptyMsg" style="display:none">no clip loaded</div>
</div>

<script>
const vid    = document.getElementById('vid');
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');
const stage  = document.getElementById('stage');
const empty  = document.getElementById('emptyMsg');

// Crop rect in normalized [0..1] coords. {x,y,w,h}
let rect = { x: 0, y: 0, w: 1, h: 1 };
let aspectRatio = 9 / 16;        // width / height of crop rect in source pixels
let clipStart = 0, clipEnd = 0;  // playback bounds within the source video
let vSrcW = 0, vSrcH = 0;        // source video pixel size (set on metadata)

// Style state mirrors ClipProjectConfig schema. Sent from Python via
// vc.setStyle(...). Used by drawSubtitles / drawWatermark / drawHookOutro
// to render placeholder text inside the crop region — purely a layout
// preview.
let styleState = {
  subtitle: {
    position: "bottom",
    stroke_color: "#000000",
    stroke_width: 2,
    sub1: { enabled: true, fontsize: 24, color: "#FFFF00", bold: true,
            text: "字幕预览第一行 sub1" },
    sub2: { enabled: false, fontsize: 24, color: "#FFFFFF", bold: false,
            text: "subtitle preview line 2" },
  },
  watermark: {
    enabled: false, type: "text", text: "@channel",
    text_fontsize: 36, text_color: "#FFFFFF", text_opacity: 70,
    image_scale: 0.15, image_opacity: 100,
    position: "top-right",
  },
  hookOutro: {
    size: 48,
    color: "#FFFFFF",
    bg_color: "#000000",
    bg_opacity: 70,
    stroke_color: "#000000",
    stroke_width: 3,
    box_padding: 10,
    hook_position: "upper-third",
    outro_position: "lower-third",
    hook_duration_sec: 5.0,
    outro_duration_sec: 5.0,
  },
};

// Per-clip text state — independent of styleState because hook/outro text
// changes per clip while the visual style is project-level.
let clipMeta = { hook: "", outro: "" };

// Output dimensions are derived from the project aspect at a 1080-class
// short edge (matches Python's _target_dims_for_aspect). The crop region
// maps to the output frame, so we scale font sizes by ch / target_h.
const SHORT_EDGE = 1080;

function targetDims() {
  if (aspectRatio < 1.0) {
    // vertical (w/h < 1) — short edge is width, long edge is height
    return { tw: SHORT_EDGE, th: Math.round(SHORT_EDGE / aspectRatio) };
  }
  return { tw: Math.round(SHORT_EDGE * aspectRatio), th: SHORT_EDGE };
}

// libass renders an SRT against PlayResX≈384 while the output is ~1080
// wide → effective glyph width ≈ 4.7× the nominal Fontsize. Mirrors
// ASS_RENDER_SCALE in core/program/clip.py so preview char-fit matches
// the burn pipeline.
const ASS_RENDER_SCALE = 4.7;

// ── public JS API (called from Python via evaluate_js) ──────────────────

window.vc = {
  setSource(url, startSec, endSec) {
    if (vid.src !== url) {
      vid.src = url;
    }
    clipStart = startSec || 0;
    clipEnd   = endSec   || 0;
    vid.currentTime = clipStart;
  },
  setClipRange(startSec, endSec) {
    clipStart = startSec || 0;
    clipEnd   = endSec   || 0;
    if (vid.currentTime < clipStart || vid.currentTime > clipEnd) {
      vid.currentTime = clipStart;
    }
  },
  setAspect(w, h) {
    aspectRatio = (w && h) ? (w / h) : (9 / 16);
    fitRectToAspect();
    drawOverlay();
  },
  setCrop(r) {
    if (!r || r.w == null || r.h == null) {
      // null → reset to centered max-fit at current aspect
      resetCropCenter();
    } else {
      rect = { x: r.x, y: r.y, w: r.w, h: r.h };
    }
    drawOverlay();
  },
  setStyle(s) {
    if (s && typeof s === 'object') {
      if (s.subtitle)  styleState.subtitle  = Object.assign({}, styleState.subtitle,  s.subtitle);
      if (s.watermark) styleState.watermark = Object.assign({}, styleState.watermark, s.watermark);
      if (s.hookOutro) styleState.hookOutro = Object.assign({}, styleState.hookOutro, s.hookOutro);
    }
    drawOverlay();
  },
  setClipMeta(meta) {
    if (meta && typeof meta === 'object') {
      if (typeof meta.hook  === 'string') clipMeta.hook  = meta.hook;
      if (typeof meta.outro === 'string') clipMeta.outro = meta.outro;
    }
    drawOverlay();
  },
  clear() {
    vid.removeAttribute('src');
    vid.load();
    empty.style.display = '';
  },
};

// ── crop math ────────────────────────────────────────────────────────────

function fitRectToAspect() {
  if (!vSrcW || !vSrcH) return;
  // Largest centered crop at aspectRatio that fits the source.
  const cur = vSrcW / vSrcH;
  if (cur > aspectRatio) {
    const newW = vSrcH * aspectRatio;
    rect = { x: (vSrcW - newW) / 2 / vSrcW, y: 0, w: newW / vSrcW, h: 1 };
  } else {
    const newH = vSrcW / aspectRatio;
    rect = { x: 0, y: (vSrcH - newH) / 2 / vSrcH, w: 1, h: newH / vSrcH };
  }
}

function resetCropCenter() { fitRectToAspect(); }

function clampRect() {
  // Keep aspect, keep within [0,1]^2.
  if (!vSrcW || !vSrcH) return;
  // Re-derive w,h from aspect anchored at current center, fit to source.
  // Width-led:
  let w = rect.w;
  let h = (w * vSrcW) / aspectRatio / vSrcH;
  if (h > 1) {
    h = 1;
    w = (h * vSrcH * aspectRatio) / vSrcW;
  }
  rect.w = w;
  rect.h = h;
  rect.x = Math.max(0, Math.min(1 - rect.w, rect.x));
  rect.y = Math.max(0, Math.min(1 - rect.h, rect.y));
}

// ── canvas overlay sizing & drawing ──────────────────────────────────────

function syncCanvasToVideo() {
  // Place the canvas exactly over the rendered <video> rect (which letter-
  // boxes inside vwrap because of object-fit semantics).
  const wrapR = document.getElementById('vwrap').getBoundingClientRect();
  const vidR  = vid.getBoundingClientRect();
  // Position canvas relative to wrap
  canvas.style.left   = (vidR.left - wrapR.left) + 'px';
  canvas.style.top    = (vidR.top  - wrapR.top)  + 'px';
  canvas.style.width  = vidR.width  + 'px';
  canvas.style.height = vidR.height + 'px';
  // Set bitmap size to source pixels for crisp lines
  if (vSrcW && vSrcH) {
    if (canvas.width !== vSrcW)  canvas.width  = vSrcW;
    if (canvas.height !== vSrcH) canvas.height = vSrcH;
  }
}

function drawOverlay() {
  syncCanvasToVideo();
  if (!vSrcW || !vSrcH) return;
  clampRect();
  ctx.clearRect(0, 0, vSrcW, vSrcH);
  // Dim outside
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.fillRect(0, 0, vSrcW, vSrcH);
  ctx.clearRect(rect.x*vSrcW, rect.y*vSrcH, rect.w*vSrcW, rect.h*vSrcH);
  // Border
  ctx.strokeStyle = '#00ff88';
  ctx.lineWidth   = Math.max(2, vSrcW / 480);
  ctx.strokeRect(rect.x*vSrcW, rect.y*vSrcH, rect.w*vSrcW, rect.h*vSrcH);
  // Crosshair
  ctx.strokeStyle = 'rgba(0,255,136,0.4)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo((rect.x+rect.w/2)*vSrcW, rect.y*vSrcH);
  ctx.lineTo((rect.x+rect.w/2)*vSrcW, (rect.y+rect.h)*vSrcH);
  ctx.moveTo(rect.x*vSrcW, (rect.y+rect.h/2)*vSrcH);
  ctx.lineTo((rect.x+rect.w)*vSrcW, (rect.y+rect.h/2)*vSrcH);
  ctx.stroke();
  // Subtitles + watermark + hook/outro live INSIDE the crop region (they
  // get burned into the output frame, which is the cropped + scaled view).
  drawSubtitles();
  drawWatermark();
  drawHookOutro();
}

function cropBox() {
  return {
    ox: rect.x * vSrcW, oy: rect.y * vSrcH,
    cw: rect.w * vSrcW, ch: rect.h * vSrcH,
  };
}

// Subtitle font px on canvas. cfg.fontsize is the libass-style nominal
// value; actual rendered glyph in the output is ~4.7× that (PlayResX
// scaling). Translate to source/canvas pixels by `ch / target_h`.
function subtitleFontPx(configSize) {
  const { ch } = cropBox();
  const { th } = targetDims();
  return Math.max(8, configSize * ASS_RENDER_SCALE * (ch / th));
}

// Hook/outro/watermark font px on canvas. ffmpeg drawtext uses real
// output pixels (no PlayResX scaling), so just `ch / target_h`.
function drawtextFontPx(configSize) {
  const { ch } = cropBox();
  const { th } = targetDims();
  return Math.max(8, configSize * (ch / th));
}

function drawSubtitles() {
  const sub = styleState.subtitle;
  if (!sub) return;
  const { ox, oy, cw, ch } = cropBox();
  const lines = [];
  if (sub.sub1 && sub.sub1.enabled) lines.push(sub.sub1);
  if (sub.sub2 && sub.sub2.enabled) lines.push(sub.sub2);
  if (lines.length === 0) return;

  // Vertical position of the BOTTOM-most subtitle line baseline
  let baseY;
  if (sub.position === "top") {
    baseY = oy + ch * 0.10 + subtitleFontPx(lines[0].fontsize);
  } else if (sub.position === "middle") {
    baseY = oy + ch * 0.50;
  } else {
    baseY = oy + ch * 0.92;
  }

  // Stack from bottom up: lines[0] above lines[1] would feel wrong; per
  // burn convention sub1 is above sub2. So the first declared line is the
  // upper one, the second is below it.
  const lineSpacing = 1.25;
  // Compute total stacked height to anchor by the chosen position
  const totalH = lines.reduce((acc, l) => acc + subtitleFontPx(l.fontsize) * lineSpacing, 0);
  let y;
  if (sub.position === "top") y = oy + ch * 0.10 + subtitleFontPx(lines[0].fontsize);
  else if (sub.position === "middle") y = oy + ch * 0.50 - totalH / 2 + subtitleFontPx(lines[0].fontsize);
  else y = oy + ch * 0.92 - totalH + subtitleFontPx(lines[0].fontsize);

  for (const line of lines) {
    const px = subtitleFontPx(line.fontsize);
    const weight = line.bold ? "bold " : "";
    ctx.font = `${weight}${px}px sans-serif`;
    ctx.textAlign = "center";
    ctx.textBaseline = "alphabetic";
    // Stroke
    if (sub.stroke_width > 0) {
      ctx.strokeStyle = sub.stroke_color || "#000";
      ctx.lineWidth = (sub.stroke_width || 2) * (px / 24);
      ctx.lineJoin = "round";
      ctx.strokeText(line.text || "", ox + cw / 2, y);
    }
    ctx.fillStyle = line.color || "#FFF";
    ctx.fillText(line.text || "", ox + cw / 2, y);
    y += px * lineSpacing;
  }
}

function _hoYForPosition(pos, oy, ch, textHeight) {
  // Mirror _y_expr_for_position in Python — but here we resolve to a
  // concrete pixel y for canvas drawing within the crop region.
  switch (pos) {
    case "top":          return oy + ch * 0.08;
    case "upper-third":  return oy + ch * 0.25;
    case "center":       return oy + ch * 0.50 - textHeight * 0.35;
    case "lower-third":  return oy + ch * 0.65;
    case "bottom":       return oy + ch * 0.85 - textHeight * 0.7;
    default:             return oy + ch * 0.25;
  }
}

function drawHookOutro() {
  const ho = styleState.hookOutro;
  if (!ho) return;
  const { ox, oy, cw, ch } = cropBox();

  // Decide which (if any) text to render based on the live playhead. We
  // sit inside the source video's timeline, so the hook window is
  // [clipStart, clipStart + hook_duration_sec] and the outro window is
  // [clipEnd - outro_duration_sec, clipEnd]. When both windows are zero
  // (no clip loaded) we render nothing.
  const t = vid.currentTime || 0;
  let text = "";
  let position = ho.hook_position;
  if (clipStart > 0 || clipEnd > 0) {
    const hookEnd  = clipStart + (ho.hook_duration_sec  || 0);
    const outroStart = clipEnd - (ho.outro_duration_sec || 0);
    if (clipMeta.hook && t >= clipStart && t < hookEnd) {
      text = clipMeta.hook;
      position = ho.hook_position;
    } else if (clipMeta.outro && t >= outroStart && t <= clipEnd) {
      text = clipMeta.outro;
      position = ho.outro_position;
    }
  } else {
    // No clip range yet — show hook as a static layout placeholder so
    // user can iterate on style.
    if (clipMeta.hook) { text = clipMeta.hook; position = ho.hook_position; }
  }
  if (!text) return;

  const px = drawtextFontPx(ho.size);
  ctx.font = `bold ${px}px sans-serif`;
  ctx.textAlign = "center";
  ctx.textBaseline = "alphabetic";

  const textWidth = ctx.measureText(text).width;
  const textHeight = px;  // approx; works visually
  const cx = ox + cw / 2;
  const baselineY = _hoYForPosition(position, oy, ch, textHeight) + textHeight;

  // Optional background box
  const bgOpacity = (ho.bg_opacity || 0) / 100.0;
  if (bgOpacity > 0) {
    const padding = (ho.box_padding || 10) * (px / 24);
    const boxX = cx - textWidth / 2 - padding;
    const boxY = baselineY - textHeight - padding;
    const boxW = textWidth + padding * 2;
    const boxH = textHeight + padding * 1.6;
    ctx.fillStyle = ho.bg_color || "#000";
    ctx.globalAlpha = bgOpacity;
    ctx.fillRect(boxX, boxY, boxW, boxH);
    ctx.globalAlpha = 1;
  }

  // Stroke + fill
  if ((ho.stroke_width || 0) > 0) {
    ctx.strokeStyle = ho.stroke_color || "#000";
    ctx.lineWidth = ho.stroke_width * (px / 24);
    ctx.lineJoin = "round";
    ctx.strokeText(text, cx, baselineY);
  }
  ctx.fillStyle = ho.color || "#FFF";
  ctx.fillText(text, cx, baselineY);
}

function drawWatermark() {
  const wm = styleState.watermark;
  if (!wm || !wm.enabled) return;
  const { ox, oy, cw, ch } = cropBox();
  const margin = Math.max(10, cw * 0.025);
  const right  = wm.position && wm.position.endsWith("right");
  const bottom = wm.position && wm.position.startsWith("bottom");

  if (wm.type === "text") {
    const px = drawtextFontPx(wm.text_fontsize || 36);
    ctx.font = `bold ${px}px sans-serif`;
    ctx.textAlign = right ? "right" : "left";
    ctx.textBaseline = bottom ? "bottom" : "top";
    const tx = right ? (ox + cw - margin) : (ox + margin);
    const ty = bottom ? (oy + ch - margin) : (oy + margin);
    ctx.globalAlpha = (wm.text_opacity != null ? wm.text_opacity : 70) / 100;
    // Text shadow for visibility against any background
    ctx.fillStyle = "rgba(0,0,0,0.5)";
    ctx.fillText(wm.text || "@channel", tx + 2, ty + 2);
    ctx.fillStyle = wm.text_color || "#FFFFFF";
    ctx.fillText(wm.text || "@channel", tx, ty);
    ctx.globalAlpha = 1;
  } else {
    // Image watermark — draw a placeholder box (we don't load the image
    // here, just show where it would land and how big it would be).
    const ww = (wm.image_scale || 0.15) * cw;
    const wh = ww * 0.6;  // arbitrary aspect for placeholder
    const wx = right  ? (ox + cw - margin - ww) : (ox + margin);
    const wy = bottom ? (oy + ch - margin - wh) : (oy + margin);
    ctx.globalAlpha = (wm.image_opacity != null ? wm.image_opacity : 100) / 100;
    ctx.fillStyle = "rgba(255,255,255,0.20)";
    ctx.fillRect(wx, wy, ww, wh);
    ctx.strokeStyle = "rgba(255,255,255,0.65)";
    ctx.lineWidth = 2;
    ctx.strokeRect(wx, wy, ww, wh);
    ctx.fillStyle = "rgba(255,255,255,0.80)";
    ctx.font = `${Math.max(12, ww*0.10)}px sans-serif`;
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText("LOGO", wx + ww/2, wy + wh/2);
    ctx.globalAlpha = 1;
  }
}

// ── interaction ──────────────────────────────────────────────────────────

function pointInRect(nx, ny) {
  return nx >= rect.x && nx <= rect.x+rect.w
      && ny >= rect.y && ny <= rect.y+rect.h;
}

// Native <video controls> reserves ~50px at the bottom for the transport
// bar (play/pause/seek/volume). Don't capture pointer events in that strip
// even when the crop rect covers it, otherwise the buttons are unclickable.
const CONTROLS_RESERVE_PX = 50;

function isInControlsStrip(clientY, rect) {
  return (clientY - rect.top) > (rect.height - CONTROLS_RESERVE_PX);
}

stage.addEventListener('mousemove', e => {
  // Translate cursor to normalized video coords
  const r = canvas.getBoundingClientRect();
  if (r.width <= 0 || r.height <= 0) return;
  const nx = (e.clientX - r.left) / r.width;
  const ny = (e.clientY - r.top)  / r.height;
  const inControls = isInControlsStrip(e.clientY, r);
  if (!inControls && (dragging || pointInRect(nx, ny))) {
    canvas.classList.add('draggable');
  } else {
    canvas.classList.remove('draggable');
  }
});

let dragging = false, dragOff = {x:0, y:0};
canvas.addEventListener('mousedown', e => {
  const r = canvas.getBoundingClientRect();
  const nx = (e.clientX - r.left) / r.width;
  const ny = (e.clientY - r.top)  / r.height;
  if (isInControlsStrip(e.clientY, r)) return;
  if (pointInRect(nx, ny)) {
    dragging = true;
    dragOff = { x: nx - rect.x, y: ny - rect.y };
    canvas.style.cursor = 'grabbing';
  }
});
window.addEventListener('mousemove', e => {
  if (!dragging) return;
  const r = canvas.getBoundingClientRect();
  const nx = (e.clientX - r.left) / r.width;
  const ny = (e.clientY - r.top)  / r.height;
  rect.x = Math.max(0, Math.min(1-rect.w, nx - dragOff.x));
  rect.y = Math.max(0, Math.min(1-rect.h, ny - dragOff.y));
  drawOverlay();
});
window.addEventListener('mouseup', () => {
  if (!dragging) return;
  dragging = false;
  canvas.style.cursor = 'grab';
  notifyCrop();
});

function notifyCrop() {
  if (window.pywebview && window.pywebview.api) {
    window.pywebview.api.notify({type: 'crop', rect: rect});
  }
}

// ── video lifecycle ──────────────────────────────────────────────────────

vid.addEventListener('loadedmetadata', () => {
  vSrcW = vid.videoWidth;
  vSrcH = vid.videoHeight;
  empty.style.display = 'none';
  fitRectToAspect();
  drawOverlay();
});

vid.addEventListener('timeupdate', () => {
  if (clipEnd > 0 && vid.currentTime >= clipEnd) {
    vid.currentTime = clipEnd - 0.05;
    vid.pause();
  } else if (clipStart > 0 && vid.currentTime < clipStart) {
    vid.currentTime = clipStart;
  }
  // Re-draw so hook/outro show/hide tracks the playhead smoothly
  // (browsers fire timeupdate ~4x/sec — same cadence as our setInterval
  // fallback, but actually pegged to the video clock).
  drawOverlay();
});

window.addEventListener('resize', drawOverlay);
// Periodic redraw catches font load / first paint hiccups
setInterval(drawOverlay, 250);
</script>
</body>
</html>
