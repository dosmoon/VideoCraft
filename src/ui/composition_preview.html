<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>VideoCraft – composition preview</title>
<style>
  html, body { margin: 0; padding: 0; background: #1a1a1a; color: #ddd;
               font-family: -apple-system, "Segoe UI", sans-serif;
               overflow: hidden; height: 100%; }
  .stage { position: relative; width: 100%; height: 100%;
           background: black; display: flex; flex-direction: column; }
  .video-wrap { position: relative; flex: 1; min-height: 0;
                display: flex; align-items: center; justify-content: center; }
  video { max-width: 100%; max-height: 100%; display: block; background: #000; }
  canvas { position: absolute; pointer-events: none; cursor: grab; }
  canvas.draggable { pointer-events: auto; }
  .empty { color: #666; font-size: 14px;
           position: absolute; left: 50%; top: 50%;
           transform: translate(-50%, -50%); }
  .err { position: absolute; left: 8px; top: 8px;
         background: rgba(180,30,30,0.85); color: #fff;
         padding: 4px 8px; font: 12px Consolas, monospace; }
</style>
</head>
<body>
<div class="stage" id="stage">
  <div class="video-wrap" id="vwrap">
    <video id="vid" controls playsinline></video>
    <canvas id="canvas"></canvas>
    <div class="empty" id="emptyMsg">no clip loaded</div>
  </div>
</div>

<script>
const vid    = document.getElementById('vid');
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');
const stage  = document.getElementById('stage');
const empty  = document.getElementById('emptyMsg');

// Crop rect in normalized [0..1] source-video coords. {x,y,w,h}
let rect = { x: 0, y: 0, w: 1, h: 1 };
let aspectRatio = 9 / 16;
let clipStart = 0, clipEnd = 0;
let vSrcW = 0, vSrcH = 0;

let styleState = {
  subtitle: {
    position: "bottom",
    stroke_color: "#000000",
    stroke_width: 2,
    block_margin_pct: 0.08,
    track_gap_pct: 0.12,
    sub1: { enabled: true, fontsize: 24, color: "#FFFF00", bold: true,
            text: "字幕预览第一行 sub1" },
    sub2: { enabled: false, fontsize: 24, color: "#FFFFFF", bold: false,
            text: "subtitle preview line 2" },
  },
  watermark: {
    enabled: false, type: "text", text: "@channel",
    text_fontsize: 36, text_color: "#FFFFFF", text_opacity: 70,
    image_scale: 0.15, image_opacity: 100,
    position: "top-right",
    margin_x_pct: 0.025,
    margin_y_pct: 0.025,
  },
  hookOutro: {
    size: 48, color: "#FFFFFF",
    bg_color: "#000000", bg_opacity: 70,
    stroke_color: "#000000", stroke_width: 3, box_padding: 10,
    hook_position: "upper-third", outro_position: "lower-third",
    hook_duration_sec: 5.0, outro_duration_sec: 5.0,
  },
};

// hook / outro = raw text; hookLines / outroLines = Python-pre-wrapped
// canonical lines. When Lines is non-null we use it as-is; otherwise we
// fall back to JS-side wrapping (legacy / safety path).
let clipMeta = { hook: "", outro: "", hookLines: null, outroLines: null };
// Real SRT cues in *source-video* timeline: [{start, end, text}]. Empty
// means render placeholder text from styleState.subtitle.sub*.text.
let cues  = [];   // sub1 — primary
let cues2 = [];   // sub2 — secondary (bilingual)

// N independent subtitle tracks (news_desk path). Each entry is
//   { line: {fontsize, color, bold, is_chinese, bg_color, bg_opacity,
//            bg_padding_x_pct},
//     position: "top"|"bottom",
//     block_margin_pct: 0.09,
//     cues: [{start, end, text}, ...] }
// Drawn after the legacy sub1/sub2 pair; each anchors independently
// (no shared track_gap), matching the renderer's per-spec MarginV.
let extraSubs = [];

// N independent watermarks (news_desk path). Each entry mirrors the
// styleState.watermark shape — drawn after the singular slot.
let extraWms = [];

// "reframe" (default) | "passthrough". Passthrough means the burn keeps
// source resolution/aspect verbatim, so the canvas uses the video's
// natural dims (no crop rect UI, no dimming).
let outputMode = "reframe";

// News-desk overlays — list of {kind, start_sec, end_sec, ...kind-specific}.
// Drawn each frame with currentTime-based visibility filter. Style data
// looked up via overlayStyles[kind][style_class].
let overlays = [];
let overlayStyles = {};   // populated from styleState.overlay_styles via setStyle

const SHORT_EDGE = 1080;
const ASS_RENDER_SCALE = 4.7;

function targetDims() {
  if (aspectRatio < 1.0) {
    return { tw: SHORT_EDGE, th: Math.round(SHORT_EDGE / aspectRatio) };
  }
  return { tw: Math.round(SHORT_EDGE * aspectRatio), th: SHORT_EDGE };
}

// ── public JS API ──────────────────────────────────────────────────────

window.vc = {
  setSource(url, startSec, endSec) {
    if (vid.src !== url) vid.src = url;
    clipStart = startSec || 0;
    clipEnd   = endSec   || 0;
    vid.currentTime = clipStart;
  },
  setClipRange(startSec, endSec) {
    clipStart = startSec || 0;
    clipEnd   = endSec   || 0;
    if (vid.currentTime < clipStart || vid.currentTime > clipEnd) {
      vid.currentTime = clipStart;
    }
  },
  setAspect(w, h) {
    aspectRatio = (w && h) ? (w / h) : (9 / 16);
    fitRectToAspect();
    drawOverlay();
  },
  setCrop(r) {
    if (!r || r.w == null || r.h == null) resetCropCenter();
    else rect = { x: r.x, y: r.y, w: r.w, h: r.h };
    drawOverlay();
  },
  setStyle(s) {
    if (s && typeof s === 'object') {
      if (s.subtitle)  styleState.subtitle  = Object.assign({}, styleState.subtitle,  s.subtitle);
      if (s.watermark) styleState.watermark = Object.assign({}, styleState.watermark, s.watermark);
      if (s.hookOutro) styleState.hookOutro = Object.assign({}, styleState.hookOutro, s.hookOutro);
      if (s.overlay_styles && typeof s.overlay_styles === 'object') {
        overlayStyles = s.overlay_styles;
      }
    }
    drawOverlay();
  },
  setOverlays(arr) {
    overlays = Array.isArray(arr) ? arr.filter(o => o && typeof o.kind === 'string') : [];
    drawOverlay();
  },
  seek(sec) {
    if (typeof sec !== 'number' || isNaN(sec)) return;
    // Clamp to the loaded clip window when one is set; otherwise to the
    // video element's natural duration (fallback is just no clamp).
    let t = sec;
    if (clipEnd > 0) {
      t = Math.max(clipStart, Math.min(clipEnd, t));
    } else if (vid.duration && isFinite(vid.duration)) {
      t = Math.max(0, Math.min(vid.duration, t));
    }
    vid.currentTime = t;
    drawOverlay();
  },
  setClipMeta(meta) {
    if (meta && typeof meta === 'object') {
      if (typeof meta.hook  === 'string') clipMeta.hook  = meta.hook;
      if (typeof meta.outro === 'string') clipMeta.outro = meta.outro;
      // Pre-wrapped lines from Python (preferred path — matches the
      // ffmpeg drawtext output exactly). `null` means "use JS fallback".
      clipMeta.hookLines  = Array.isArray(meta.hookLines)  ? meta.hookLines  : null;
      clipMeta.outroLines = Array.isArray(meta.outroLines) ? meta.outroLines : null;
    }
    drawOverlay();
  },
  setCues(arr) {
    cues = Array.isArray(arr) ? arr.filter(c =>
        c && typeof c.text === 'string' &&
        typeof c.start === 'number' && typeof c.end === 'number') : [];
    drawOverlay();
  },
  setCuesSecondary(arr) {
    cues2 = Array.isArray(arr) ? arr.filter(c =>
        c && typeof c.text === 'string' &&
        typeof c.start === 'number' && typeof c.end === 'number') : [];
    drawOverlay();
  },
  setExtraSubtitles(arr) {
    extraSubs = Array.isArray(arr) ? arr.filter(e => e && e.line) : [];
    drawOverlay();
  },
  setExtraWatermarks(arr) {
    extraWms = Array.isArray(arr) ? arr.filter(w => w && w.enabled) : [];
    drawOverlay();
  },
  setOutputMode(mode) {
    outputMode = (mode === "passthrough") ? "passthrough" : "reframe";
    if (outputMode === "passthrough" && vSrcW && vSrcH) {
      aspectRatio = vSrcW / vSrcH;
      rect = { x: 0, y: 0, w: 1, h: 1 };
    }
    drawOverlay();
  },
  enableCropDrag(on) {
    cropDragEnabled = !!on;
    canvas.style.cursor = cropDragEnabled ? 'grab' : 'default';
    drawOverlay();
  },
  clear() {
    vid.removeAttribute('src');
    vid.load();
    empty.style.display = '';
  },
};

// Drag-enable flag — Python toggles this per preview instance (style tab =
// global crop, clip tab = per-clip crop). When false, all canvas pointer
// events are ignored.
let cropDragEnabled = true;

// ── crop math ────────────────────────────────────────────────────────────

function fitRectToAspect() {
  if (!vSrcW || !vSrcH) return;
  const cur = vSrcW / vSrcH;
  if (cur > aspectRatio) {
    const newW = vSrcH * aspectRatio;
    rect = { x: (vSrcW - newW) / 2 / vSrcW, y: 0, w: newW / vSrcW, h: 1 };
  } else {
    const newH = vSrcW / aspectRatio;
    rect = { x: 0, y: (vSrcH - newH) / 2 / vSrcH, w: 1, h: newH / vSrcH };
  }
}
function resetCropCenter() { fitRectToAspect(); }
function clampRect() {
  if (!vSrcW || !vSrcH) return;
  let w = rect.w;
  let h = (w * vSrcW) / aspectRatio / vSrcH;
  if (h > 1) { h = 1; w = (h * vSrcH * aspectRatio) / vSrcW; }
  rect.w = w; rect.h = h;
  rect.x = Math.max(0, Math.min(1 - rect.w, rect.x));
  rect.y = Math.max(0, Math.min(1 - rect.h, rect.y));
}

// ── canvas overlay sizing & drawing ──────────────────────────────────────

function syncCanvasToVideo() {
  const wrapR = document.getElementById('vwrap').getBoundingClientRect();
  const vidR  = vid.getBoundingClientRect();
  canvas.style.left   = (vidR.left - wrapR.left) + 'px';
  canvas.style.top    = (vidR.top  - wrapR.top)  + 'px';
  canvas.style.width  = vidR.width  + 'px';
  canvas.style.height = vidR.height + 'px';
  if (vSrcW && vSrcH) {
    if (canvas.width  !== vSrcW) canvas.width  = vSrcW;
    if (canvas.height !== vSrcH) canvas.height = vSrcH;
  }
}

function drawOverlay() {
  syncCanvasToVideo();
  if (!vSrcW || !vSrcH) return;
  if (outputMode === "passthrough") {
    // Canvas mirrors source dims; no crop, no reframe.
    aspectRatio = vSrcW / vSrcH;
    rect = { x: 0, y: 0, w: 1, h: 1 };
  } else {
    clampRect();
  }
  ctx.clearRect(0, 0, vSrcW, vSrcH);
  // Crop rect UI: only when drag is enabled AND we're actually cropping
  // (i.e., not in passthrough mode). Otherwise just draw overlays on the
  // unmasked video so previews of subtitle-only / news-desk workflows
  // don't get the green-box clutter.
  if (cropDragEnabled && outputMode !== "passthrough") {
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.fillRect(0, 0, vSrcW, vSrcH);
    ctx.clearRect(rect.x*vSrcW, rect.y*vSrcH, rect.w*vSrcW, rect.h*vSrcH);
    ctx.strokeStyle = '#00ff88';
    ctx.lineWidth   = Math.max(2, vSrcW / 480);
    ctx.strokeRect(rect.x*vSrcW, rect.y*vSrcH, rect.w*vSrcW, rect.h*vSrcH);
    ctx.strokeStyle = 'rgba(0,255,136,0.4)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo((rect.x+rect.w/2)*vSrcW, rect.y*vSrcH);
    ctx.lineTo((rect.x+rect.w/2)*vSrcW, (rect.y+rect.h)*vSrcH);
    ctx.moveTo(rect.x*vSrcW, (rect.y+rect.h/2)*vSrcH);
    ctx.lineTo((rect.x+rect.w)*vSrcW, (rect.y+rect.h/2)*vSrcH);
    ctx.stroke();
  }
  drawSubtitles();
  drawWatermark();
  drawHookOutro();
  drawNewsDeskOverlays();
}

// ── news-desk overlays (LowerThird + TopicStrip) ─────────────────────────
//
// Mirrors core/composition/news_desk_overlays.py. Pixel coordinates derive
// from the same pct fields the libass renderer reads, so layout matches
// across engines. Time visibility uses absolute video currentTime (overlay
// specs carry source-video time stamps the same way subtitle cues do).

function _resolveOverlayStyle(kind, styleClass) {
  const byKind = overlayStyles && overlayStyles[kind];
  if (!byKind) return null;
  return byKind[styleClass || "default"] || byKind["default"] || null;
}

function _hexToRgba(hex, opacity0to100) {
  const h = (hex || "#000000").replace("#", "");
  if (h.length !== 6) return `rgba(0,0,0,${(opacity0to100||0)/100})`;
  const r = parseInt(h.substr(0,2), 16);
  const g = parseInt(h.substr(2,2), 16);
  const b = parseInt(h.substr(4,2), 16);
  return `rgba(${r},${g},${b},${(opacity0to100||0)/100})`;
}

function _estTextWidthPx(text, fontsize) {
  if (!text) return 0;
  let cjk = 0;
  for (const ch of text) if (ch.charCodeAt(0) > 0x2E80) cjk++;
  const latin = text.length - cjk;
  return cjk * fontsize + latin * fontsize * 0.55;
}

function drawNewsDeskOverlays() {
  if (!overlays || overlays.length === 0) return;
  const t = vid.currentTime || 0;
  const { ox, oy, cw, ch } = cropBox();
  // Overlay pixel coords are computed against the CROPPED frame (the
  // visible content area), matching the libass render which positions
  // against the post-crop frame too.
  for (const ov of overlays) {
    if (typeof ov.start_sec === "number" && t < ov.start_sec) continue;
    if (typeof ov.end_sec === "number" && ov.end_sec > 0 && t >= ov.end_sec) continue;
    if (ov.kind === "lower_third") {
      _drawLowerThird(ov, ox, oy, cw, ch);
    } else if (ov.kind === "topic_strip") {
      _drawTopicStrip(ov, ox, oy, cw, ch);
    } else if (ov.kind === "chapter_point_card") {
      _drawChapterPointCard(ov, ox, oy, cw, ch);
    } else if (ov.kind === "chapter_hero_card") {
      _drawChapterHeroCard(ov, ox, oy, cw, ch);
    } else if (ov.kind === "date_stamp") {
      _drawDateStamp(ov, ox, oy, cw, ch);
    }
  }
}

function _drawLowerThird(ov, ox, oy, cw, ch) {
  const st = _resolveOverlayStyle("lower_third", ov.style_class) || {};
  const titleSize    = (st.title_fontsize    != null ? st.title_fontsize    : 38);
  const subSize      = (st.subtitle_fontsize != null ? st.subtitle_fontsize : 24);
  const padPx        = Math.max(4, (st.padding_pct  != null ? st.padding_pct  : 0.012) * ch);
  const lineGapPx    = Math.max(2, (st.line_gap_pct != null ? st.line_gap_pct : 0.005) * ch);
  const accentWPx    = (st.accent_width_pct != null ? st.accent_width_pct : 0.006) * cw;
  const marginX      = (st.margin_x_pct != null ? st.margin_x_pct : 0.05) * cw;
  const marginY      = (st.margin_y_pct != null ? st.margin_y_pct : 0.10) * ch;

  const titleW = _estTextWidthPx(ov.title, titleSize);
  const subW   = _estTextWidthPx(ov.subtitle, subSize);
  const textW  = Math.max(titleW, subW);
  const subH   = ov.subtitle ? subSize : 0;
  const textBlockH = titleSize + (subH ? lineGapPx + subH : 0);
  const barH = textBlockH + padPx * 2;
  let barW = Math.max(textW + padPx * 2 + accentWPx, cw * 0.20);

  const barY = oy + ch - marginY - barH;
  let barX, accentX, textLeft;
  if (ov.position === "bottom-right") {
    barX = ox + cw - marginX - barW;
    accentX = barX + barW - accentWPx;
    textLeft = barX + padPx;
  } else {
    barX = ox + marginX;
    accentX = barX;
    textLeft = barX + accentWPx + padPx;
  }

  // Bar bg.
  ctx.fillStyle = _hexToRgba(st.bg_color || "#0F172A",
                                st.bg_opacity != null ? st.bg_opacity : 88);
  ctx.fillRect(barX, barY, barW, barH);
  // Accent stripe.
  if (accentWPx > 0) {
    ctx.fillStyle = _hexToRgba(st.accent_color || "#C8102E", 100);
    ctx.fillRect(accentX, barY, accentWPx, barH);
  }
  // Title.
  ctx.textAlign = "left";
  ctx.textBaseline = "top";
  ctx.font = `${st.title_bold === false ? "" : "bold "}${titleSize}px sans-serif`;
  ctx.fillStyle = st.title_color || "#FFFFFF";
  ctx.fillText(ov.title || "", textLeft, barY + padPx);
  // Subtitle.
  if (ov.subtitle) {
    ctx.font = `${st.subtitle_bold ? "bold " : ""}${subSize}px sans-serif`;
    ctx.fillStyle = st.subtitle_color || "#E2E8F0";
    ctx.fillText(ov.subtitle, textLeft, barY + padPx + titleSize + lineGapPx);
  }
}

function _drawTopicStrip(ov, ox, oy, cw, ch) {
  const st = _resolveOverlayStyle("topic_strip", ov.style_class) || {};
  const stripH = Math.max(8, (st.height_pct != null ? st.height_pct : 0.055) * ch);
  const stripY = oy + Math.max(0, (st.top_margin_pct != null ? st.top_margin_pct : 0.0) * ch);
  const padPx  = Math.max(8, (st.text_padding_pct != null ? st.text_padding_pct : 0.025) * cw);
  const fontPx = st.fontsize != null ? st.fontsize : 26;

  ctx.fillStyle = _hexToRgba(st.bg_color || "#1E40AF",
                                st.bg_opacity != null ? st.bg_opacity : 90);
  ctx.fillRect(ox, stripY, cw, stripH);

  ctx.font = `${st.bold === false ? "" : "bold "}${fontPx}px sans-serif`;
  ctx.fillStyle = st.text_color || "#FFFFFF";
  ctx.textBaseline = "middle";
  const align = st.text_align || "left";
  let tx;
  if (align === "center")      { tx = ox + cw / 2; ctx.textAlign = "center"; }
  else if (align === "right")  { tx = ox + cw - padPx; ctx.textAlign = "right"; }
  else                         { tx = ox + padPx; ctx.textAlign = "left"; }
  ctx.fillText(ov.topic_text || "", tx, stripY + stripH / 2);
}

function _wrapTextCjk(text, maxChars) {
  // Mirror of core/composition/news_desk_overlays.py::_wrap_text_cjk —
  // CJK char counts 1, ASCII counts 0.5; max 2 lines, surplus truncated …
  text = (text || "").trim();
  if (!text || maxChars <= 0) return [];
  const cost = (ch) => (ch.charCodeAt(0) > 0x2E80 ? 1.0 : 0.5);
  const lines = [];
  let cur = [];
  let curW = 0;
  let lastBreak = -1;
  for (const ch of text) {
    const w = cost(ch);
    if (curW + w > maxChars && cur.length > 0) {
      if (lastBreak >= 0 && cur[cur.length - 1].charCodeAt(0) <= 0x2E80) {
        lines.push(cur.slice(0, lastBreak).join("").replace(/\s+$/, ""));
        cur = cur.slice(lastBreak + 1);
        curW = cur.reduce((s, c) => s + cost(c), 0);
        lastBreak = -1;
      } else {
        lines.push(cur.join(""));
        cur = [];
        curW = 0;
        lastBreak = -1;
      }
      if (lines.length >= 2) break;
    }
    cur.push(ch);
    curW += w;
    if (ch === " ") lastBreak = cur.length - 1;
  }
  if (cur.length > 0 && lines.length < 2) {
    lines.push(cur.join("").replace(/\s+$/, ""));
  }
  if (lines.length >= 2 && curW > maxChars) {
    let tail = lines[1];
    while (tail && [...tail].reduce((s, c) => s + cost(c), 0) > maxChars - 0.5) {
      tail = tail.slice(0, -1);
    }
    lines[1] = (tail.replace(/\s+$/, "") || "") + "…";
  }
  return lines;
}

function _drawChapterPointCard(ov, ox, oy, cw, ch) {
  // Broadcast L3 — fitted dark band + left red accent + centered text.
  // Mirrors core/composition/news_desk_overlays.py::_build_chapter_point_card_dialogues.
  const st = _resolveOverlayStyle("chapter_point_card", ov.style_class) || {};
  const fontPx    = st.fontsize != null ? st.fontsize : 40;
  const lineGapPx = Math.max(2, (st.line_gap_pct != null ? st.line_gap_pct : 0.005) * ch);
  const yPct      = st.y_pct != null ? st.y_pct : 0.70;
  const maxChars  = Math.max(4, st.max_chars_per_line != null ? st.max_chars_per_line : 22);
  const padX      = Math.max(8, (st.padding_x_pct != null ? st.padding_x_pct : 0.020) * cw);
  const padY      = Math.max(6, (st.padding_y_pct != null ? st.padding_y_pct : 0.014) * ch);
  const accentW   = Math.max(0, (st.accent_width_pct != null ? st.accent_width_pct : 0.004) * cw);
  const fadeInMs  = st.fade_in_ms  != null ? st.fade_in_ms  : 350;
  const fadeOutMs = st.fade_out_ms != null ? st.fade_out_ms : 300;
  const slidePx   = st.slide_in_px != null ? st.slide_in_px : 24;

  const wrapped = _wrapTextCjk(ov.text, maxChars);
  if (wrapped.length === 0) return;

  // Animation timing — relative to overlay window.
  const t = vid.currentTime || 0;
  const tIn  = (t - ov.start_sec) * 1000;
  const tOut = (ov.end_sec - t)   * 1000;
  if (tIn < 0 || tOut < 0) return;

  let alpha = 1.0;
  let yOffset = 0.0;
  if (fadeInMs > 0 && tIn < fadeInMs) {
    const p = tIn / fadeInMs;
    alpha = Math.min(alpha, p);
    yOffset = (1 - p) * slidePx;
  }
  if (fadeOutMs > 0 && tOut < fadeOutMs) {
    alpha = Math.min(alpha, tOut / fadeOutMs);
  }
  if (alpha <= 0.01) return;

  // Band geometry.
  const textW = Math.max(...wrapped.map(ln => _estTextWidthPx(ln, fontPx)));
  const textBlockH = fontPx * wrapped.length + lineGapPx * (wrapped.length - 1);
  const bandW = textW + padX * 2 + accentW;
  const bandH = textBlockH + padY * 2;
  const bandX = ox + (cw - bandW) / 2;
  const bandY = oy + ch * yPct - bandH / 2 + yOffset;

  ctx.save();
  ctx.globalAlpha = alpha;

  // Background band.
  ctx.fillStyle = _hexToRgba(st.bg_color || "#0F172A",
                                st.bg_opacity != null ? st.bg_opacity : 78);
  ctx.fillRect(bandX, bandY, bandW, bandH);

  // Left accent stripe.
  if (accentW > 0) {
    ctx.fillStyle = _hexToRgba(st.accent_color || "#C8102E", 100);
    ctx.fillRect(bandX, bandY, accentW, bandH);
  }

  // Text — centered in the text region (excluding the accent stripe).
  const textRegionLeft = bandX + accentW + padX;
  const textCx = textRegionLeft + textW / 2;
  const textTop = bandY + padY;
  ctx.textAlign = "center";
  ctx.textBaseline = "top";
  // Quote the font name in case it has spaces; canvas falls back through
  // the list, so we add sans-serif as the final fallback.
  const fontName = st.font || "SimHei";
  ctx.font = `${st.bold === false ? "" : "bold "}${fontPx}px "${fontName}", sans-serif`;
  ctx.fillStyle = st.text_color || "#FFFFFF";
  for (let i = 0; i < wrapped.length; i++) {
    const ly = textTop + i * (fontPx + lineGapPx);
    ctx.fillText(wrapped[i], textCx, ly);
  }

  ctx.restore();
}

function _drawChapterHeroCard(ov, ox, oy, cw, ch) {
  // Centered hero card — large title + multi-line body on a dark backdrop.
  // Mirrors core/composition/news_desk_overlays.py::_build_chapter_hero_card_dialogues.
  const baseSt = _resolveOverlayStyle("chapter_hero_card", ov.style_class) || {};
  // Inline overrides from the chapter component property panel.
  const st = Object.assign({}, baseSt, ov.inline_style || {});

  const titleSize = st.title_fontsize != null ? st.title_fontsize : 56;
  const bodySize  = st.body_fontsize  != null ? st.body_fontsize  : 28;
  const padX = Math.max(8, (st.padding_x_pct != null ? st.padding_x_pct : 0.035) * cw);
  const padY = Math.max(6, (st.padding_y_pct != null ? st.padding_y_pct : 0.030) * ch);
  const gap  = Math.max(4, (st.title_body_gap_pct != null ? st.title_body_gap_pct : 0.020) * ch);
  const yPct = st.y_pct != null ? st.y_pct : 0.45;
  const maxCardW = Math.max(80, (st.max_width_pct != null ? st.max_width_pct : 0.72) * cw);
  const bodyMaxChars = Math.max(4, st.body_max_chars_per_line != null ? st.body_max_chars_per_line : 36);
  const bodyMaxLines = Math.max(1, st.body_max_lines != null ? st.body_max_lines : 4);
  const titleMaxChars = Math.max(4, Math.floor(bodyMaxChars * 0.7));

  const title = (ov.title || "").trim();
  const body  = (ov.body  || "").trim();
  const titleWrapped = title ? _wrapTextCjkN(title, titleMaxChars, 1) : [];
  const bodyWrapped  = body  ? _wrapTextCjkN(body, bodyMaxChars, bodyMaxLines) : [];

  if (titleWrapped.length === 0 && bodyWrapped.length === 0) return;

  // Animation — fade in/out only; no slide for this size.
  const t = vid.currentTime || 0;
  const tIn  = (t - ov.start_sec) * 1000;
  const tOut = (ov.end_sec - t)   * 1000;
  if (tIn < 0 || tOut < 0) return;
  const fadeIn  = st.fade_in_ms  != null ? st.fade_in_ms  : 400;
  const fadeOut = st.fade_out_ms != null ? st.fade_out_ms : 350;
  let alpha = 1.0;
  if (fadeIn > 0 && tIn < fadeIn)   alpha = Math.min(alpha, tIn / fadeIn);
  if (fadeOut > 0 && tOut < fadeOut) alpha = Math.min(alpha, tOut / fadeOut);
  if (alpha <= 0.01) return;

  ctx.save();
  ctx.globalAlpha = alpha;

  const titleW = titleWrapped.reduce((m, ln) => Math.max(m, _estTextWidthPx(ln, titleSize)), 0);
  const bodyW  = bodyWrapped.reduce ((m, ln) => Math.max(m, _estTextWidthPx(ln, bodySize)),  0);
  const textW  = Math.min(maxCardW - padX * 2, Math.max(titleW, bodyW));
  const nT = titleWrapped.length;
  const nB = bodyWrapped.length;
  const textBlockH = nT * titleSize
                       + ((nT && nB) ? gap : 0)
                       + nB * bodySize;

  const cardW = Math.min(maxCardW, textW + padX * 2);
  const cardH = textBlockH + padY * 2;
  const cardX = ox + (cw - cardW) / 2;
  const cardY = oy + ch * yPct - cardH / 2;
  const textCx = cardX + cardW / 2;
  const titleTop = cardY + padY;
  const bodyTop  = titleTop + nT * titleSize + ((nT && nB) ? gap : 0);

  // Backdrop card.
  ctx.fillStyle = _hexToRgba(st.bg_color || "#000000",
                                st.bg_opacity != null ? st.bg_opacity : 75);
  ctx.fillRect(cardX, cardY, cardW, cardH);

  ctx.textAlign = "center";
  ctx.textBaseline = "top";
  const fontName = st.font || "Microsoft YaHei";

  // Title.
  if (nT > 0) {
    ctx.fillStyle = st.title_color || "#FFFFFF";
    ctx.font = `${st.title_bold === false ? "" : "bold "}${titleSize}px "${fontName}", sans-serif`;
    for (let i = 0; i < nT; i++) {
      ctx.fillText(titleWrapped[i], textCx, titleTop + i * titleSize);
    }
  }
  // Body.
  if (nB > 0) {
    ctx.fillStyle = st.body_color || "#E5E7EB";
    ctx.font = `${st.body_bold ? "bold " : ""}${bodySize}px "${fontName}", sans-serif`;
    for (let i = 0; i < nB; i++) {
      ctx.fillText(bodyWrapped[i], textCx, bodyTop + i * bodySize);
    }
  }

  ctx.restore();
}

function _wrapTextCjkN(text, maxChars, maxLines) {
  // Like _wrapTextCjk but with configurable maxLines. Surplus past
  // maxLines is appended with an ellipsis on the last line.
  text = (text || "").trim();
  if (!text || maxChars <= 0 || maxLines <= 0) return [];
  const cost = (ch) => (ch.charCodeAt(0) > 0x2E80 ? 1.0 : 0.5);
  const lines = [];
  let cur = [];
  let curW = 0;
  let lastBreak = -1;
  let overflow = false;
  for (const ch of text) {
    const w = cost(ch);
    if (curW + w > maxChars && cur.length > 0) {
      if (lastBreak >= 0 && cur[cur.length - 1].charCodeAt(0) <= 0x2E80) {
        lines.push(cur.slice(0, lastBreak).join("").replace(/\s+$/, ""));
        cur = cur.slice(lastBreak + 1);
        curW = cur.reduce((s, c) => s + cost(c), 0);
        lastBreak = -1;
      } else {
        lines.push(cur.join(""));
        cur = [];
        curW = 0;
        lastBreak = -1;
      }
      if (lines.length >= maxLines) { overflow = true; break; }
    }
    cur.push(ch);
    curW += w;
    if (ch === " ") lastBreak = cur.length - 1;
  }
  if (cur.length > 0 && lines.length < maxLines) {
    lines.push(cur.join("").replace(/\s+$/, ""));
  } else if (cur.length > 0) {
    overflow = true;
  }
  if (overflow && lines.length > 0) {
    let tail = lines[lines.length - 1];
    while (tail && [...tail].reduce((s, c) => s + cost(c), 0) > maxChars - 0.5) {
      tail = tail.slice(0, -1);
    }
    lines[lines.length - 1] = (tail.replace(/\s+$/, "") || "") + "…";
  }
  return lines;
}

function _drawDateStamp(ov, ox, oy, cw, ch) {
  // Compact corner date label — mirrors
  // core/composition/news_desk_overlays.py::_build_date_stamp_dialogues.
  const st = _resolveOverlayStyle("date_stamp", ov.style_class) || {};
  const fontPx   = st.fontsize != null ? st.fontsize : 22;
  const padX     = Math.max(2, (st.padding_x_pct != null ? st.padding_x_pct : 0.008) * cw);
  const padY     = Math.max(2, (st.padding_y_pct != null ? st.padding_y_pct : 0.004) * ch);
  const marginX  = (st.margin_x_pct != null ? st.margin_x_pct : 0.025) * cw;
  const marginY  = (st.margin_y_pct != null ? st.margin_y_pct : 0.025) * ch;
  const bgOpa    = st.bg_opacity != null ? st.bg_opacity : 60;

  const text = ov.text || "";
  if (!text) return;

  ctx.font = `${st.bold ? "bold " : ""}${fontPx}px "${st.font || "SimHei"}", sans-serif`;
  ctx.textAlign = "left";
  ctx.textBaseline = "top";
  const textW = ctx.measureText(text).width;
  const boxW = textW + padX * 2;
  const boxH = fontPx + padY * 2;

  const pos = (ov.position || "bottom-left").toLowerCase();
  let boxX, boxY;
  if (pos === "top-left") {
    boxX = ox + marginX;
    boxY = oy + marginY;
  } else if (pos === "top-right") {
    boxX = ox + cw - marginX - boxW;
    boxY = oy + marginY;
  } else if (pos === "bottom-right") {
    boxX = ox + cw - marginX - boxW;
    boxY = oy + ch - marginY - boxH;
  } else {  // bottom-left (default)
    boxX = ox + marginX;
    boxY = oy + ch - marginY - boxH;
  }

  if (bgOpa > 0) {
    ctx.fillStyle = _hexToRgba(st.bg_color || "#0F172A", bgOpa);
    ctx.fillRect(boxX, boxY, boxW, boxH);
  }
  ctx.fillStyle = st.text_color || "#FFFFFF";
  ctx.fillText(text, boxX + padX, boxY + padY);
}

function cropBox() {
  return {
    ox: rect.x * vSrcW, oy: rect.y * vSrcH,
    cw: rect.w * vSrcW, ch: rect.h * vSrcH,
  };
}

function subtitleFontPx(configSize) {
  const { ch } = cropBox();
  const { th } = targetDims();
  return Math.max(8, configSize * ASS_RENDER_SCALE * (ch / th));
}
function drawtextFontPx(configSize) {
  const { ch } = cropBox();
  const { th } = targetDims();
  return Math.max(8, configSize * (ch / th));
}

function pickActiveCueFrom(arr) {
  // Pick the cue whose [start, end] brackets the playhead. Cues are in
  // source-video timeline. Returns the cue text, or null.
  if (!arr || arr.length === 0) return null;
  const t = vid.currentTime || 0;
  for (const c of arr) {
    if (t >= c.start && t < c.end) return c.text;
  }
  return null;
}

// Layout math — mirrors core/composition/layout.py. Same normalized
// pct values from styleState drive baseline positions on both renderers.
function subtitleBaselineY(blockMarginPct, trackGapPct, isInnerTrack,
                            anchor, oy, ch) {
  // outer track sits at blockMarginPct from anchored edge;
  // inner track one trackGapPct closer to frame center.
  const extra = isInnerTrack ? trackGapPct : 0.0;
  const pct = blockMarginPct + extra;
  if (anchor === "top") return oy + ch * pct;
  return oy + ch * (1.0 - pct);  // bottom (default)
}

function drawSubtitles() {
  const sub = styleState.subtitle;
  if (!sub) return;
  const { ox, oy, cw, ch } = cropBox();
  // Cues pushed from Python are PRE-SPLIT into short single-line entries
  // (mirrors how libass + the burn pipeline handle long lines: split into
  // more cues with their own timing, never wrap visually). So we render one
  // line per active cue — no JS-side wrapping needed.
  // sub1 reads from `cues`, sub2 from `cues2`. When the corresponding
  // stream is empty the placeholder text from styleState falls through.
  const live1 = pickActiveCueFrom(cues);
  const live2 = pickActiveCueFrom(cues2);
  const sub1 = sub.sub1 && sub.sub1.enabled
    ? { ...sub.sub1, text: live1 != null ? live1 : sub.sub1.text }
    : null;
  const sub2 = sub.sub2 && sub.sub2.enabled
    ? { ...sub.sub2, text: live2 != null ? live2 : sub.sub2.text }
    : null;
  // NOTE: don't early-return when sub1+sub2 are both null — extraSubs
  // (news_desk N-track path) may still need to render below.

  const blockPct = (typeof sub.block_margin_pct === "number")
                     ? sub.block_margin_pct : 0.08;
  const gapPct   = (typeof sub.track_gap_pct === "number")
                     ? sub.track_gap_pct : 0.12;
  const anchor   = sub.position || "bottom";

  // At bottom anchor: sub2 is the outer track (near edge), sub1 inner.
  // At top anchor:    sub1 is the outer track, sub2 inner.
  // Middle anchor is intentionally unsupported for stacking — both
  // tracks would overlap; fall back to a centered approximation.
  for (const line of [sub1, sub2]) {
    if (!line) continue;
    let y;
    if (anchor === "middle") {
      const offset = (line === sub1) ? -gapPct/2 : gapPct/2;
      y = oy + ch * (0.5 + offset);
    } else {
      const isOuter = (anchor === "top") ? (line === sub1) : (line === sub2);
      y = subtitleBaselineY(blockPct, gapPct, !isOuter, anchor, oy, ch);
    }
    drawSubtitleLine(line, y, ox, cw, ch, sub.stroke_color, sub.stroke_width);
  }

  // N independent extra tracks (news_desk path). Each anchors at its own
  // block_margin_pct from its own position edge — no shared track_gap.
  // Stroke borrows the global stroke_color/width from the legacy slot.
  for (const es of extraSubs) {
    const line = es.line;
    if (!line) continue;
    const live = pickActiveCueFrom(es.cues);
    const text = (live != null) ? live : "";
    if (!text) continue;
    const renderLine = { ...line, text };
    const eAnchor = es.position || "bottom";
    const eBlock = (typeof es.block_margin_pct === "number")
                     ? es.block_margin_pct : 0.09;
    const y = (eAnchor === "top")
                ? oy + ch * eBlock + subtitleFontPx(line.fontsize)
                : oy + ch * (1.0 - eBlock);
    drawSubtitleLine(renderLine, y, ox, cw, ch,
                       sub.stroke_color, sub.stroke_width);
  }
}

// One subtitle line at a fixed baseline `y`. Pulled out of drawSubtitles
// so the legacy sub1/sub2 stack and the N-track extras path share styling.
function drawSubtitleLine(line, y, ox, cw, ch, strokeColor, strokeWidth) {
  const px = subtitleFontPx(line.fontsize);
  const weight = line.bold ? "bold " : "";
  ctx.font = `${weight}${px}px sans-serif`;
  ctx.textAlign = "center";
  ctx.textBaseline = "alphabetic";
  const text = line.text || "";
  if (line.bg_opacity > 0 && text) {
    const tw = ctx.measureText(text).width;
    const padPctH = (line.bg_padding_x_pct != null
                      ? line.bg_padding_x_pct : 0.006);
    const padPx = Math.max(2, padPctH * ch);
    const boxH = px + padPx * 2;
    const boxW = tw + padPx * 2;
    const boxX = ox + cw / 2 - boxW / 2;
    const boxY = y - px + padPx * 0.2 - padPx;
    ctx.fillStyle = _hexToRgba(line.bg_color || "#000000", line.bg_opacity);
    ctx.fillRect(boxX, boxY, boxW, boxH);
  }
  if ((strokeWidth || 0) > 0 && line.bg_opacity <= 0) {
    ctx.strokeStyle = strokeColor || "#000";
    ctx.lineWidth = (strokeWidth || 2) * (px / 24);
    ctx.lineJoin = "round";
    ctx.strokeText(text, ox + cw / 2, y);
  }
  ctx.fillStyle = line.color || "#FFF";
  ctx.fillText(text, ox + cw / 2, y);
}

// Mirrors core/composition/fonts.py:y_expr_for_position. Returns the TOP
// of the (possibly multi-line) text block — render side's drawtext y= uses
// the exact same formula via `text_h`.
function _hoYForPosition(pos, oy, ch, textHeight) {
  switch (pos) {
    case "top":          return oy + ch * 0.08;
    case "upper-third":  return oy + ch * 0.25;
    case "center":       return oy + (ch - textHeight) / 2;
    case "lower-third":  return oy + ch * 0.65 - textHeight / 2;
    case "bottom":       return oy + ch * 0.85 - textHeight;
    default:             return oy + ch * 0.25;
  }
}

// Wrap `text` to lines that each fit within `maxWidth` (canvas measure).
// CJK-friendly: tries to break at spaces first, then falls back to char-
// by-char so a long Chinese run-on doesn't render as a single overflowing
// line. Returns string[].
function wrapTextToWidth(text, maxWidth) {
  if (!text) return [];
  if (ctx.measureText(text).width <= maxWidth) return [text];
  const lines = [];
  let buf = "";
  for (const ch of text) {
    const candidate = buf + ch;
    if (ctx.measureText(candidate).width > maxWidth && buf) {
      lines.push(buf);
      buf = ch;
    } else {
      buf = candidate;
    }
  }
  if (buf) lines.push(buf);
  return lines;
}

function drawHookOutro() {
  const ho = styleState.hookOutro;
  if (!ho) return;
  const { ox, oy, cw, ch } = cropBox();

  // Hook window: [clipStart, clipStart + hook_duration_sec]
  // Outro window: [clipEnd - outro_duration_sec, clipEnd]
  const t = vid.currentTime || 0;
  let text = "";
  let position = ho.hook_position;
  let preWrapped = null;
  if (clipStart > 0 || clipEnd > 0) {
    const hookEnd  = clipStart + (ho.hook_duration_sec  || 0);
    const outroStart = clipEnd - (ho.outro_duration_sec || 0);
    if (clipMeta.hook && t >= clipStart && t < hookEnd) {
      text = clipMeta.hook;
      preWrapped = clipMeta.hookLines;
      position = ho.hook_position;
    } else if (clipMeta.outro && t >= outroStart && t <= clipEnd) {
      text = clipMeta.outro;
      preWrapped = clipMeta.outroLines;
      position = ho.outro_position;
    }
  } else if (clipMeta.hook) {
    text = clipMeta.hook;
    preWrapped = clipMeta.hookLines;
    position = ho.hook_position;
  }
  if (!text) return;

  const px = drawtextFontPx(ho.size);
  ctx.font = `bold ${px}px sans-serif`;
  ctx.textAlign = "center";
  ctx.textBaseline = "alphabetic";

  // Lines come from Python (canonical) if available; otherwise wrap here
  // as a fallback (layout will diverge from final mp4 — last resort).
  const padding = (ho.box_padding || 10) * (px / 24);
  const maxTextWidth = Math.max(40, cw * 0.88 - padding * 2);
  const lines = (preWrapped && preWrapped.length > 0)
    ? preWrapped
    : wrapTextToWidth(text, maxTextWidth);
  const lineHeight = px * 1.15;
  const totalTextHeight = lines.length * lineHeight;
  const widestLine = lines.reduce(
    (m, l) => Math.max(m, ctx.measureText(l).width), 0);

  const cx = ox + cw / 2;
  // _hoYForPosition gives the TOP of the text block; shift down by the
  // baseline for the first line.
  const topY = _hoYForPosition(position, oy, ch, totalTextHeight);
  const firstBaselineY = topY + lineHeight - (lineHeight - px) / 2;

  const bgOpacity = (ho.bg_opacity || 0) / 100.0;
  if (bgOpacity > 0) {
    const boxX = cx - widestLine / 2 - padding;
    const boxY = topY - padding * 0.4;
    const boxW = widestLine + padding * 2;
    const boxH = totalTextHeight + padding * 1.2;
    ctx.fillStyle = ho.bg_color || "#000";
    ctx.globalAlpha = bgOpacity;
    ctx.fillRect(boxX, boxY, boxW, boxH);
    ctx.globalAlpha = 1;
  }

  for (let i = 0; i < lines.length; i++) {
    const ly = firstBaselineY + i * lineHeight;
    if ((ho.stroke_width || 0) > 0) {
      ctx.strokeStyle = ho.stroke_color || "#000";
      ctx.lineWidth = ho.stroke_width * (px / 24);
      ctx.lineJoin = "round";
      ctx.strokeText(lines[i], cx, ly);
    }
    ctx.fillStyle = ho.color || "#FFF";
    ctx.fillText(lines[i], cx, ly);
  }
}

function pixelOffsetFromPct(pct, dim) {
  return Math.max(8, Math.floor((pct || 0) * dim));
}

function drawWatermark() {
  if (styleState.watermark && styleState.watermark.enabled) {
    drawSingleWatermark(styleState.watermark);
  }
  for (const wm of extraWms) {
    drawSingleWatermark(wm);
  }
}

function drawSingleWatermark(wm) {
  if (!wm || !wm.enabled) return;
  const { ox, oy, cw, ch } = cropBox();
  // Mirrors core.composition.layout.pixel_offset: normalized margins,
  // each axis against its own frame dimension.
  const marginX = pixelOffsetFromPct(wm.margin_x_pct != null ? wm.margin_x_pct : 0.025, cw);
  const marginY = pixelOffsetFromPct(wm.margin_y_pct != null ? wm.margin_y_pct : 0.025, ch);
  const right  = wm.position && wm.position.endsWith("right");
  const bottom = wm.position && wm.position.startsWith("bottom");
  if (wm.type === "text") {
    const px = drawtextFontPx(wm.text_fontsize || 36);
    ctx.font = `bold ${px}px sans-serif`;
    ctx.textAlign = right ? "right" : "left";
    ctx.textBaseline = bottom ? "bottom" : "top";
    const tx = right ? (ox + cw - marginX) : (ox + marginX);
    const ty = bottom ? (oy + ch - marginY) : (oy + marginY);
    ctx.globalAlpha = (wm.text_opacity != null ? wm.text_opacity : 70) / 100;
    ctx.fillStyle = "rgba(0,0,0,0.5)";
    ctx.fillText(wm.text || "@channel", tx + 2, ty + 2);
    ctx.fillStyle = wm.text_color || "#FFFFFF";
    ctx.fillText(wm.text || "@channel", tx, ty);
    ctx.globalAlpha = 1;
  } else {
    const ww = (wm.image_scale || 0.15) * cw;
    const img = _wmImage(wm.image_path);
    ctx.globalAlpha = (wm.image_opacity != null ? wm.image_opacity : 100) / 100;
    if (img && img.complete && img.naturalWidth > 0) {
      const wh = ww * (img.naturalHeight / img.naturalWidth);
      const wx = right  ? (ox + cw - marginX - ww) : (ox + marginX);
      const wy = bottom ? (oy + ch - marginY - wh) : (oy + marginY);
      ctx.drawImage(img, wx, wy, ww, wh);
    } else {
      // Image not loaded yet (or path empty/missing) — placeholder so the
      // user still sees position + scale while the bitmap streams in.
      const wh = ww * 0.6;
      const wx = right  ? (ox + cw - marginX - ww) : (ox + marginX);
      const wy = bottom ? (oy + ch - marginY - wh) : (oy + marginY);
      ctx.fillStyle = "rgba(255,255,255,0.20)";
      ctx.fillRect(wx, wy, ww, wh);
      ctx.strokeStyle = "rgba(255,255,255,0.65)";
      ctx.lineWidth = 2;
      ctx.strokeRect(wx, wy, ww, wh);
      ctx.fillStyle = "rgba(255,255,255,0.80)";
      ctx.font = `${Math.max(12, ww*0.10)}px sans-serif`;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(wm.image_path ? "loading…" : "LOGO",
                    wx + ww/2, wy + wh/2);
    }
    ctx.globalAlpha = 1;
  }
}

// Image cache keyed by absolute file path. drawImage needs an HTMLImageElement
// so we lazily new Image()+load on first sight; once loaded the next paint
// (250ms tick or any drawOverlay call) draws the real bitmap.
const _wmImageCache = {};
function _wmImage(path) {
  if (!path) return null;
  const cached = _wmImageCache[path];
  if (cached) return cached;
  const img = new Image();
  // file:// URL — WebView2 allows local images on file:/// pages.
  img.src = "file:///" + path.replace(/\\/g, "/");
  img.onload = () => drawOverlay();
  _wmImageCache[path] = img;
  return img;
}

// ── interaction (crop rect drag) ─────────────────────────────────────────

function pointInRect(nx, ny) {
  return nx >= rect.x && nx <= rect.x+rect.w
      && ny >= rect.y && ny <= rect.y+rect.h;
}

const CONTROLS_RESERVE_PX = 50;
function isInControlsStrip(clientY, rect) {
  return (clientY - rect.top) > (rect.height - CONTROLS_RESERVE_PX);
}

stage.addEventListener('mousemove', e => {
  if (!cropDragEnabled) return;
  const r = canvas.getBoundingClientRect();
  if (r.width <= 0 || r.height <= 0) return;
  const nx = (e.clientX - r.left) / r.width;
  const ny = (e.clientY - r.top)  / r.height;
  const inControls = isInControlsStrip(e.clientY, r);
  if (!inControls && (dragging || pointInRect(nx, ny))) {
    canvas.classList.add('draggable');
  } else {
    canvas.classList.remove('draggable');
  }
});

let dragging = false, dragOff = {x:0, y:0};
canvas.addEventListener('mousedown', e => {
  if (!cropDragEnabled) return;
  const r = canvas.getBoundingClientRect();
  const nx = (e.clientX - r.left) / r.width;
  const ny = (e.clientY - r.top)  / r.height;
  if (isInControlsStrip(e.clientY, r)) return;
  if (pointInRect(nx, ny)) {
    dragging = true;
    dragOff = { x: nx - rect.x, y: ny - rect.y };
    canvas.style.cursor = 'grabbing';
  }
});
window.addEventListener('mousemove', e => {
  if (!dragging) return;
  const r = canvas.getBoundingClientRect();
  const nx = (e.clientX - r.left) / r.width;
  const ny = (e.clientY - r.top)  / r.height;
  rect.x = Math.max(0, Math.min(1-rect.w, nx - dragOff.x));
  rect.y = Math.max(0, Math.min(1-rect.h, ny - dragOff.y));
  drawOverlay();
});
window.addEventListener('mouseup', () => {
  if (!dragging) return;
  dragging = false;
  canvas.style.cursor = 'grab';
  notifyCrop();
});

function notifyCrop() {
  if (window.pywebview && window.pywebview.api) {
    window.pywebview.api.notify({type: 'crop', rect: rect});
  }
}

// ── video lifecycle ──────────────────────────────────────────────────────

vid.addEventListener('loadedmetadata', () => {
  vSrcW = vid.videoWidth;
  vSrcH = vid.videoHeight;
  empty.style.display = 'none';
  if (outputMode === "passthrough") {
    aspectRatio = vSrcW / vSrcH;
    rect = { x: 0, y: 0, w: 1, h: 1 };
  } else {
    fitRectToAspect();
  }
  drawOverlay();
});

vid.addEventListener('timeupdate', () => {
  if (clipEnd > 0 && vid.currentTime >= clipEnd) {
    // Loop the clip window so users get a continuous preview without
    // having to scrub manually.
    vid.currentTime = clipStart;
  } else if (clipStart > 0 && vid.currentTime < clipStart) {
    vid.currentTime = clipStart;
  }
  drawOverlay();
});

window.addEventListener('resize', drawOverlay);
setInterval(drawOverlay, 250);
</script>
