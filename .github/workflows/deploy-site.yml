name: Deploy Site

on:
  push:
    branches: [main]
    paths:
      - 'docs/public/**'
      - 'site/**'
      - '.github/workflows/deploy-site.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: withastro/action@v6
        with:
          path: ./site
          node-version: 22
          package-manager: pnpm@9 # pin v9, see dosmoon.github.io/docs/docs-system-plan.md

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
