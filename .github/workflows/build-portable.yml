name: Build Portable

on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'   # v1.0.0, v1.0.0-beta.1, v2.1.0-rc.1 ...
  workflow_dispatch:                 # 手动触发：仅构建+上传 artifact，不创建 Release

concurrency:
  group: build-portable-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Package
    runs-on: windows-latest
    timeout-minutes: 30
    permissions:
      contents: write   # 创建 Release 需要

    steps:
      # 1. Checkout
      - name: Checkout
        uses: actions/checkout@v4

      # 2. 安装 Python 3.14（含 tkinter DLLs，供 build_portable.py 复制）
      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      # 3. 快速验证 tkinter DLLs 存在（失败早发现）
      - name: Verify tkinter DLLs
        shell: python
        run: |
          import sys, os
          dlls = os.path.join(os.path.dirname(sys._base_executable), "DLLs")
          print(f"Python: {sys.version}")
          print(f"DLLs dir: {dlls}")
          missing = []
          for f in ["_tkinter.pyd", "tcl86t.dll", "tk86t.dll", "zlib1.dll"]:
              found = os.path.exists(os.path.join(dlls, f))
              print(f"  {'OK' if found else 'MISSING'}: {f}")
              if not found:
                  missing.append(f)
          if missing:
              raise SystemExit(f"Missing DLLs: {missing}")

      # 4. 运行打包脚本
      - name: Build portable distribution
        env:
          VIDEOCRAFT_PYTHON_VERSION: '3.14.3'
        run: python build_portable.py

      # 5. 确定 zip 文件名
      #    tag 触发 → VideoCraft-portable-v1.0.0.zip
      #    手动触发 → VideoCraft-portable-dev.zip
      - name: Determine zip filename
        id: meta
        shell: bash
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            ZIP_NAME="VideoCraft-portable-${{ github.ref_name }}.zip"
            IS_PRERELEASE=$([[ "${{ github.ref_name }}" == *"-"* ]] && echo "true" || echo "false")
          else
            ZIP_NAME="VideoCraft-portable-dev.zip"
            IS_PRERELEASE="false"
          fi
          echo "zip_name=${ZIP_NAME}"          >> "$GITHUB_OUTPUT"
          echo "is_prerelease=${IS_PRERELEASE}" >> "$GITHUB_OUTPUT"
          echo "ZIP: ${ZIP_NAME}, pre-release: ${IS_PRERELEASE}"

      # 6. 压缩（PowerShell，windows-latest 原生支持）
      - name: Package into zip
        shell: pwsh
        run: |
          $zip = "${{ github.workspace }}\${{ steps.meta.outputs.zip_name }}"
          Compress-Archive -Path "dist\VideoCraft-portable" `
                           -DestinationPath $zip `
                           -CompressionLevel Optimal
          $mb = [math]::Round((Get-Item $zip).Length / 1MB, 1)
          Write-Host "Packaged: ${{ steps.meta.outputs.zip_name }} (${mb} MB)"

      # 7. 上传为 Workflow Artifact（手动触发和 tag 触发均上传，保留 90 天）
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.zip_name }}
          path: ${{ github.workspace }}/${{ steps.meta.outputs.zip_name }}
          retention-days: 90
          if-no-files-found: error

      # 8. 创建 GitHub Release（仅 tag 触发）
      - name: Create GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          tag_name:   ${{ github.ref_name }}
          name:       VideoCraft ${{ github.ref_name }}
          prerelease: ${{ steps.meta.outputs.is_prerelease }}
          files:      ${{ github.workspace }}/${{ steps.meta.outputs.zip_name }}
          body: |
            ## VideoCraft Portable ${{ github.ref_name }}

            ### 下载与安装
            1. 下载 `${{ steps.meta.outputs.zip_name }}`
            2. 解压到任意目录（路径中避免中文或空格）
            3. 双击 `VideoCraft.bat` 启动主界面

            ### 运行要求
            - Windows 10 / 11 x64
            - 无需安装 Python（便携版内含 Python 3.14）
            - 首次使用在 `keys/` 目录填写对应 API 密钥

            ### 包含启动器
            | 文件 | 说明 |
            |------|------|
            | `VideoCraft.bat` | 主界面（VideoCraftHub） |
            | `SrtTools.bat` | 字幕工具集 |
            | `VideoTools.bat` | 视频处理工具 |
            | `SplitVideo.bat` | 视频分割工具 |

            ### 升级提示
            首次运行后会在解压目录生成 `user_data/`（语言、窗口布局、最近项目、烧录预设等）和 `keys/*.key`（API 密钥）。升级到新版本时保留这两个目录即可，配置和密钥不会丢。

            ---
            自动构建 · commit `${{ github.sha }}` · [查看构建日志](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
