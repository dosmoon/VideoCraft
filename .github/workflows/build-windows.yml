# Build the VideoCraft Windows installer on a GitHub-hosted runner.
#
# Why CI exists for this: the full packaging chain (PyInstaller sidecar +
# bundled ffmpeg + electron-builder NSIS) is reproduced here so the exe gets its
# brand icon embedded. A GitHub windows runner — unlike a non-admin / non-Dev-Mode
# dev box — has the SeCreateSymbolicLinkPrivilege that electron-builder's
# winCodeSign tool needs to extract (its archive carries macOS symlinks). So the
# local electron-builder.yml keeps `win.signAndEditExecutable: false` (to build at
# all on the dev box, at the cost of the default Electron icon), and the build step
# below flips it back to `true` in the checkout so rcedit embeds the real icon. See
# packaging-design.md §3.
#
# The exe is still UNSIGNED — no Authenticode certificate is configured. Real
# signing is a later step (needs a cert; packaging-design.md §10).
#
# Triggers: manual dispatch + version tags (v*). The build is heavy (~10-20 min:
# it downloads ffmpeg, runs PyInstaller, and pulls Electron + builder tools), so
# it is NOT run on every push. It uploads the installer as a build artifact and
# does NOT publish a GitHub Release (--publish never).

name: Build Windows installer

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    # Pinned (not windows-latest): windows-latest migrates to this image by
    # 2026-06-15 anyway — pinning keeps the build reproducible and surprise-free.
    runs-on: windows-2025
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # uv drives the sidecar freeze (build_sidecar.ps1: `uv venv --python 3.12`
      # auto-fetches a managed Python 3.12, then `uv sync --frozen` from uv.lock).
      - name: Install uv
        # setup-uv publishes no floating major tag — pin the exact latest.
        uses: astral-sh/setup-uv@v8.2.0

      # PyInstaller onedir -> desktop/resources/sidecar/core_rpc.exe (+ _internal/).
      # The script smoke-tests the frozen exe over its HTTP transport before exiting.
      - name: Build sidecar (PyInstaller onedir)
        shell: pwsh
        run: ./packaging/build_sidecar.ps1

      # Pinned static ffmpeg/ffprobe -> desktop/resources/ (bundled into the app).
      - name: Fetch bundled ffmpeg + ffprobe
        shell: pwsh
        run: ./packaging/fetch_ffmpeg.ps1

      # Per-build identity (build = this run, git SHA, timestamp) -> build-info.json
      # shipped beside the app + shown in the About card. Must precede the build:
      # electron-builder's extraResources requires resources/build-info.json.
      - name: Generate build-info
        shell: pwsh
        env:
          BUILD_NUMBER: ${{ github.run_number }}
        run: ./packaging/generate_build_info.ps1

      # pnpm before setup-node so the latter's `cache: pnpm` can find the store.
      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.15.9

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: desktop/pnpm-lock.yaml

      - name: Install desktop deps
        working-directory: desktop
        run: pnpm install --frozen-lockfile

      - name: Build installer (NSIS, brand icon embedded)
        working-directory: desktop
        shell: pwsh
        env:
          # electron-builder folds BUILD_NUMBER into the Windows FileVersion
          # (-> <version>.<run_number>) — effective only because the flip below
          # turns signAndEditExecutable on (rcedit runs). See docs/versioning.md.
          BUILD_NUMBER: ${{ github.run_number }}
        # This runner has the symlink privilege winCodeSign needs, so flip the
        # local workaround (signAndEditExecutable: false) to true in the
        # checked-out config — rcedit then embeds the brand icon into the exe.
        # An in-place line edit, NOT a `-c.win.signAndEditExecutable=true` CLI flag:
        # that dotted short-form is parsed as a config *file path* by yargs across
        # pwsh/pnpm and the build fails with ENOENT. `--publish never` guards
        # against an accidental GitHub Release. The exe stays unsigned (no cert).
        run: |
          (Get-Content electron-builder.yml -Raw) -replace 'signAndEditExecutable: false', 'signAndEditExecutable: true' | Set-Content electron-builder.yml -NoNewline
          pnpm exec electron-vite build
          pnpm exec electron-builder --win --publish never

      - name: Upload installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: VideoCraft-windows-installer
          path: desktop/release/*-setup.exe
          if-no-files-found: error
